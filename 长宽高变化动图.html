<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>五年级数学 - 长方体体积：长、宽、高的影响</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background-color: #ffffff;
        }
        /* 简洁主按钮 */
        .main-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 60px;
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 30;
            font-family: inherit;
            box-shadow: 0 6px 14px rgba(59,130,246,0.3);
            transition: 0.1s linear;
            letter-spacing: 1px;
            pointer-events: auto;
            white-space: nowrap;
            border: 1px solid #bfdbfe;
        }
        .main-btn:hover {
            background: #2563eb;
            transform: translateX(-50%) scale(1.02);
        }
        /* 图例 */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 28px;
            font-size: 0.75rem;
            color: #334155;
            z-index: 20;
            display: flex;
            gap: 16px;
            pointer-events: none;
            border: 1px solid #e2e8f0;
            font-weight: 500;
        }
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 12px;
            display: inline-block;
            margin-right: 6px;
        }
        @media (max-width: 680px) {
            .main-btn { padding: 8px 24px; font-size: 0.9rem; bottom: 30px; }
            .legend { font-size: 0.65rem; gap: 12px; padding: 4px 12px; }
        }
    </style>
</head>
<body>
    <button class="main-btn" id="startDemoBtn">▶ 开始演示 · 长宽高变化</button>
    <div class="legend">
        <span><div class="color-dot" style="background: #ff6666;"></div> X轴 (长)</span>
        <span><div class="color-dot" style="background: #66ff66;"></div> Y轴 (高)</span>
        <span><div class="color-dot" style="background: #66aaff;"></div> Z轴 (宽)</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import TWEEN from 'https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js';

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3.8, 2.8, 4.5);
        camera.lookAt(0.8, 0.5, 0.8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = false;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 轨道控制
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0.8, 0.5, 0.8);

        // --- 照明 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambientLight);
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0xe0e0e0, 0.6);
        scene.add(hemiLight);
        const fillLight1 = new THREE.PointLight(0xffaa88, 0.4);
        fillLight1.position.set(2, 3, 2);
        scene.add(fillLight1);
        const fillLight2 = new THREE.PointLight(0x88aaff, 0.3);
        fillLight2.position.set(-1.5, 2, 3);
        scene.add(fillLight2);
        const backLight = new THREE.PointLight(0xccaa88, 0.25);
        backLight.position.set(-1, 1, -2.5);
        scene.add(backLight);
        const softDirLight = new THREE.DirectionalLight(0xfff5e6, 0.35);
        softDirLight.position.set(1, 2, 1);
        scene.add(softDirLight);

        // ========== 网格地面：放在 y = 0 平面，长方体底部紧贴网格 ==========
        const gridSize = 5.0;
        const gridDivisions = 20;   // 间距0.25
        const gridHelper = new THREE.GridHelper(gridSize, gridDivisions, 0x94a3b8, 0x64748b);
        gridHelper.position.y = 0;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.7;
        scene.add(gridHelper);

        // ========== 长方体：左下前顶点固定在原点，底部在 y=0 上 ==========
        const initLength = 1.5;   // X轴方向
        const initWidth = 1.0;    // Z轴方向
        const initHeight = 2 / 3; // 约0.6667
        
        const fixedCorner = new THREE.Vector3(0, 0, 0);  // 左下前顶点
        
        const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({
            color: 0x7ab6ff,
            emissive: 0x001133,
            roughness: 0.3,
            metalness: 0.1,
            transparent: true,
            opacity: 0.85
        });
        const box = new THREE.Mesh(boxGeometry, material);
        scene.add(box);
        
        const edgesGeo = new THREE.EdgesGeometry(boxGeometry);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0xaaccff });
        const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
        box.add(wireframe);
        
        function updateBoxPosition() {
            const L = box.scale.x;
            const H = box.scale.y;
            const W = box.scale.z;
            box.position.set(fixedCorner.x + L/2, fixedCorner.y + H/2, fixedCorner.z + W/2);
        }
        
        box.scale.set(initLength, initHeight, initWidth);
        updateBoxPosition();
        
        // ========== 坐标轴：加粗明显，使用圆柱体，但箭头用扁平状（非常扁的圆锥）消除体积感 ==========
        const axisLenX = 2.2;
        const axisLenZ = 2.0;
        const axisLenY = 1.6;
        const originPoint = fixedCorner;
        const xEnd = new THREE.Vector3(axisLenX, 0, 0);
        const yEnd = new THREE.Vector3(0, axisLenY, 0);
        const zEnd = new THREE.Vector3(0, 0, axisLenZ);
        
        // 创建圆柱体轴线 (加粗半径)
        function createSolidAxis(p1, p2, radius, color) {
            const start = new THREE.Vector3(p1.x, p1.y, p1.z);
            const end = new THREE.Vector3(p2.x, p2.y, p2.z);
            const dir = new THREE.Vector3().subVectors(end, start);
            const len = dir.length();
            const cylGeo = new THREE.CylinderGeometry(radius, radius, len, 8);
            const cylMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.2, metalness: 0.05 });
            const cylinder = new THREE.Mesh(cylGeo, cylMat);
            const center = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
            cylinder.position.copy(center);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
            return cylinder;
        }
        
        // 创建扁平箭头（极扁的圆锥，几乎感觉不到体积，更像是一个2D指示）
        function createFlatArrowhead(basePos, direction, color, headLength, headRadius) {
            const dirVec = direction.clone().normalize();
            // 使用非常扁平的圆锥，高度小但半径相对大，视觉上没体积感
            const coneGeo = new THREE.ConeGeometry(headRadius, headLength, 8);
            const coneMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5, emissive: 0x000000 });
            const cone = new THREE.Mesh(coneGeo, coneMat);
            const center = basePos.clone().add(dirVec.clone().multiplyScalar(headLength/2));
            cone.position.copy(center);
            cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dirVec);
            return cone;
        }
        
        const axisRadius = 0.028;  // 加粗轴线
        // X轴 - 红色，箭头扁平
        const xAxisCyl = createSolidAxis(originPoint, xEnd, axisRadius, 0xff6666);
        const xArrow = createFlatArrowhead(xEnd, new THREE.Vector3(1,0,0), 0xff6666, 0.16, 0.06);
        scene.add(xAxisCyl);
        scene.add(xArrow);
        
        // Y轴 - 绿色
        const yAxisCyl = createSolidAxis(originPoint, yEnd, axisRadius, 0x66ff66);
        const yArrow = createFlatArrowhead(yEnd, new THREE.Vector3(0,1,0), 0x66ff66, 0.14, 0.055);
        scene.add(yAxisCyl);
        scene.add(yArrow);
        
        // Z轴 - 蓝色
        const zAxisCyl = createSolidAxis(originPoint, zEnd, axisRadius, 0x66aaff);
        const zArrow = createFlatArrowhead(zEnd, new THREE.Vector3(0,0,1), 0x66aaff, 0.15, 0.058);
        scene.add(zAxisCyl);
        scene.add(zArrow);
        
        // 添加完整的XYZ标识 (长(X)、高(Y)、宽(Z))
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        function makeAxisLabel(text, bgColor, position) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.backgroundColor = bgColor;
            div.style.color = 'white';
            div.style.fontSize = '13px';
            div.style.fontWeight = 'bold';
            div.style.padding = '2px 8px';
            div.style.borderRadius = '20px';
            div.style.border = '1px solid rgba(0,0,0,0.2)';
            div.style.fontFamily = "monospace";
            div.style.textShadow = "1px 1px 0 rgba(0,0,0,0.2)";
            const label = new CSS2DObject(div);
            label.position.copy(position);
            scene.add(label);
        }
        makeAxisLabel('长 (X)', 'rgba(200,70,70,0.9)', new THREE.Vector3(2.0, -0.22, 0));
        makeAxisLabel('高 (Y)', 'rgba(70,200,70,0.9)', new THREE.Vector3(0, 1.45, 0));
        makeAxisLabel('宽 (Z)', 'rgba(70,130,255,0.9)', new THREE.Vector3(0, -0.22, 1.85));
        
        // 固定顶点标记 (金色小球)
        const cornerMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.045, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 })
        );
        cornerMarker.position.copy(fixedCorner);
        scene.add(cornerMarker);
        
        // 没有白色刻度点
        
        // ========== 动画系统 ==========
        let isAnimating = false;
        
        async function animateAxisScaled(axis, fromVal, toVal, duration) {
            return new Promise((resolve) => {
                const startObj = { val: fromVal };
                const endObj = { val: toVal };
                const tween = new TWEEN.Tween(startObj)
                    .to(endObj, duration)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .onUpdate(() => {
                        const newVal = startObj.val;
                        if (axis === 'x') box.scale.x = newVal;
                        else if (axis === 'y') box.scale.y = newVal;
                        else if (axis === 'z') box.scale.z = newVal;
                        updateBoxPosition();
                    })
                    .onComplete(() => {
                        if (axis === 'x') box.scale.x = toVal;
                        else if (axis === 'y') box.scale.y = toVal;
                        else if (axis === 'z') box.scale.z = toVal;
                        updateBoxPosition();
                        resolve();
                    });
                tween.start();
            });
        }
        
        async function stretchAndShrink(axis, startVal, maxVal, stretchMs = 1250, shrinkMs = 1050) {
            await animateAxisScaled(axis, startVal, maxVal, stretchMs);
            await new Promise(r => setTimeout(r, 280));
            await animateAxisScaled(axis, maxVal, startVal, shrinkMs);
            await new Promise(r => setTimeout(r, 250));
        }
        
        async function resetToInitial() {
            if (isAnimating) {
                TWEEN.removeAll();
                isAnimating = false;
            }
            box.scale.set(initLength, initHeight, initWidth);
            updateBoxPosition();
        }
        
        async function demonstrateLength() {
            box.scale.y = initHeight;
            box.scale.z = initWidth;
            updateBoxPosition();
            const original = initLength;
            const maxVal = original * 1.4;   // 1.5 -> 2.1
            await stretchAndShrink('x', original, maxVal, 1200, 1000);
        }
        
        async function demonstrateWidth() {
            box.scale.x = initLength;
            box.scale.y = initHeight;
            updateBoxPosition();
            const original = initWidth;
            const maxVal = original * 1.8;   // 1.0 -> 1.8
            await stretchAndShrink('z', original, maxVal, 1200, 1000);
        }
        
        async function demonstrateHeight() {
            box.scale.x = initLength;
            box.scale.z = initWidth;
            updateBoxPosition();
            const original = initHeight;      // 0.667
            const maxVal = original * 1.5;   // 约1.0
            await stretchAndShrink('y', original, maxVal, 1200, 1000);
        }
        
        async function runFullDemo() {
            if (isAnimating) return;
            isAnimating = true;
            await resetToInitial();
            await new Promise(r => setTimeout(r, 180));
            
            await demonstrateLength();
            await new Promise(r => setTimeout(r, 380));
            await demonstrateWidth();
            await new Promise(r => setTimeout(r, 380));
            await demonstrateHeight();
            
            isAnimating = false;
        }
        
        document.getElementById('startDemoBtn').addEventListener('click', () => {
            runFullDemo();
        });
        
        resetToInitial();
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
